version: '3.8'

services:
  budget-tracker:
    build: .
    container_name: budget-tracker
    ports:
      - "3001:3001"
    volumes:
      # Persist SQLite database
      - budget_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  budget_data:
    driver: local